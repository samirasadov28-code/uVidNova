<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset — uVidNova</title>
  <meta name="description" content="Asset-level reconstruction cost and financing data — uVidNova Ukraine reconstruction atlas.">
  <meta name="theme-color" content="#0d2248">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="app-version" content="0.2.1">

  <!-- OG / Twitter updated dynamically by asset-view.js via document.title;
       static fallbacks below serve link-unfurl crawlers that don't run JS. -->
  <meta property="og:type"        content="article">
  <meta property="og:site_name"   content="uVidNova">
  <meta property="og:title"       content="Asset profile — uVidNova">
  <meta property="og:description" content="Reconstruction cost estimates, financing structure, and de-risking instruments for a Ukrainian infrastructure asset.">
  <meta property="og:image"       content="https://atlasvidnova.org/assets/logo_512.png">
  <meta name="twitter:card"       content="summary">

  <link rel="manifest"         href="/manifest.webmanifest">
  <link rel="icon"             href="/assets/logo_192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/logo_192.png">
  <link rel="stylesheet"       href="/css/app.css">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(function() {});
    }
  </script>
</head>
<body class="asset-page">

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="wordmark" aria-label="uVidNova home">
        <img src="/assets/logo_192.png" alt="" class="logo-img" width="36" height="36" loading="lazy">
        <span class="wordmark-text"><span class="u">u</span><span class="vid">Vid</span><span class="nova">Nova</span></span>
      </a>
      <p class="tagline">Ukraine Reconstruction Finance Atlas</p>
      <nav class="site-nav">
        <a href="/" class="nav-link" data-page="map">Map</a>
        <a href="/finance.html" class="nav-link" data-page="finance">Finance</a>
        <a href="/trust.html" class="nav-link" data-page="trust">Trust</a>
        <a href="/about.html" class="nav-link" data-page="about">About</a>
        <button class="lang-toggle" id="langToggle" aria-label="Switch language">🇬🇧 | UK</button>
      </nav>
    </div>
  </header>

  <main class="asset-main" id="assetMain">
    <div class="loading-state" id="loadingState">
      <p>Loading asset…</p>
    </div>
    <div class="error-state" id="errorState" hidden>
      <p id="errorMessage">Asset not found.</p>
      <a href="/">← Return to map</a>
    </div>
    <article class="asset-record" id="assetRecord" hidden></article>
  </main>

  <!-- ── Version bar ─────────────────────────────────────────────────────── -->
  <div class="version-bar" role="status">
    <span class="version-label" id="versionLabel">v0.0.3</span>
  </div>

  <script type="module" src="/js/asset-view.js"></script>
</body>
</html>

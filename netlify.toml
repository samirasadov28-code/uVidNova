[build]
  publish = "public"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# ── Security headers (all pages) ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # connect-src: self (API/data) + OSM + CartoDB tiles + Wikipedia.
    # script-src: cdnjs for Chart.js (trust.html), googletagmanager for GA4. Groq called server-side only.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://commons.wikimedia.org https://upload.wikimedia.org https://www.googletagmanager.com; connect-src 'self' https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://en.wikipedia.org https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; font-src 'self' https://cdnjs.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self';"

# ── Cache: static JS/CSS — long-lived (SW version bump invalidates on deploy) ─
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: images and icons — long-lived ──────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# ── Cache: data files — 1 hour, publicly cacheable ────────────────────────────
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

# ── Cache: HTML pages — always revalidate ─────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: service worker — never cache (must re-fetch on every load) ─────────
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Cache: manifest — short cache ─────────────────────────────────────────────
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# ── Redirects ─────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/trust"
  to = "/trust.html"
  status = 200

[[redirects]]
  from = "/asset"
  to = "/asset.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/finance"
  to = "/finance.html"
  status = 200

[[redirects]]
  from = "/api/classify"
  to = "/.netlify/functions/classify"
  status = 200

[[redirects]]
  from = "/api/narrate"
  to = "/.netlify/functions/narrate"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

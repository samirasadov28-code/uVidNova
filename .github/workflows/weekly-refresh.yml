name: Weekly Refresh

on:
  schedule:
    # Every Monday 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generates report but does not commit or open PR)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Generate weekly refresh report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run weekly refresh script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node scripts/weekly-refresh.js ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Locate report file
        id: report
        run: |
          REPORT=$(ls reports/weekly-*.json 2>/dev/null | sort | tail -1)
          if [ -z "$REPORT" ]; then
            echo "No report file found — dry run or script error." >> "$GITHUB_STEP_SUMMARY"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"  >> "$GITHUB_OUTPUT"
            echo "path=$REPORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract signal counts
        if: steps.report.outputs.found == 'true'
        id: counts
        run: |
          R="${{ steps.report.outputs.path }}"
          echo "date=$(jq -r '.date' "$R")"                                         >> "$GITHUB_OUTPUT"
          echo "items=$(jq '.feed_items_fetched' "$R")"                             >> "$GITHUB_OUTPUT"
          echo "redamage=$(jq '.re_damage_signals | length' "$R")"                  >> "$GITHUB_OUTPUT"
          echo "lifecycle=$(jq '.lifecycle_signals | length' "$R")"                 >> "$GITHUB_OUTPUT"
          echo "candidates=$(jq '.candidate_new_assets | length' "$R")"             >> "$GITHUB_OUTPUT"
          echo "stale=$(jq '.data_quality.stale_assets | length' "$R")"             >> "$GITHUB_OUTPUT"
          echo "pending=$(jq '.data_quality.pending_data_assets | length' "$R")"   >> "$GITHUB_OUTPUT"
          echo "highrd=$(jq '.data_quality.high_redamage_assets | length' "$R")"   >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: steps.report.outputs.found == 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Weekly Refresh — ${{ steps.counts.outputs.date }}

          | Signal | Count |
          |--------|-------|
          | Feed items fetched | ${{ steps.counts.outputs.items }} |
          | Re-damage signals | ${{ steps.counts.outputs.redamage }} |
          | Lifecycle signals | ${{ steps.counts.outputs.lifecycle }} |
          | Candidate new assets | ${{ steps.counts.outputs.candidates }} |
          | Stale assets (>30 d) | ${{ steps.counts.outputs.stale }} |
          | Pending-data specs | ${{ steps.counts.outputs.pending }} |
          | High re-damage (≥2) | ${{ steps.counts.outputs.highrd }} |
          EOF

      - name: Commit report and open draft PR
        if: >
          steps.report.outputs.found == 'true' &&
          github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.counts.outputs.date }}"
          BRANCH="refresh/weekly-${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add reports/
          git commit -m "data: weekly refresh report ${DATE}"
          git push origin "$BRANCH"

          # Write PR body to a temp file (avoids heredoc quoting issues)
          cat > /tmp/pr-body.md << BODY
          ## Weekly Refresh — ${DATE}

          Auto-generated by the weekly refresh workflow. **Nothing in this PR auto-merges.**
          Review each signal, make changes manually, run \`node scripts/validate-all.js\`, then merge.

          ### Signals from RSS feeds
          | Signal | Count |
          |--------|-------|
          | Feed items fetched | ${{ steps.counts.outputs.items }} |
          | Re-damage signals | ${{ steps.counts.outputs.redamage }} |
          | Lifecycle signals | ${{ steps.counts.outputs.lifecycle }} |
          | Candidate new assets (LLM-classified) | ${{ steps.counts.outputs.candidates }} |

          ### Data quality (local scan)
          | Check | Count |
          |-------|-------|
          | Stale assets — \`last_reviewed\` > 30 days | ${{ steps.counts.outputs.stale }} |
          | Assets with pending-data physical specs | ${{ steps.counts.outputs.pending }} |
          | Assets with re-damage count ≥ 2 | ${{ steps.counts.outputs.highrd }} |

          ### Review checklist
          - [ ] Verify each re-damage signal against source links in \`reports/weekly-${DATE}.json\`
          - [ ] Update \`damage.re_damage_count\` on confirmed re-struck assets
          - [ ] Verify each lifecycle signal; update \`wartime_status.lifecycle\` accordingly
          - [ ] For each candidate new asset: verify LLM classification, confirm sources,
                run \`node scripts/new-asset.js <ASSET_ID>\`, fill physical specs
          - [ ] For stale assets: update \`last_reviewed\` date after verification
          - [ ] Run \`node scripts/validate-all.js\` — must pass before merge
          - [ ] Bump \`CACHE_VERSION\` in \`service-worker.js\` if any \`public/\` files changed

          > Report file: \`reports/weekly-${DATE}.json\`
          BODY

          gh pr create \
            --title "Weekly refresh — ${DATE}" \
            --body-file /tmp/pr-body.md \
            --draft \
            --base main \
            --head "$BRANCH"

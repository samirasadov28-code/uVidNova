name: Weekly Refresh

on:
  schedule:
    # Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR created)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Generate weekly refresh report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run weekly refresh script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node scripts/weekly-refresh.js ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Check for report
        id: check_report
        run: |
          REPORT=$(ls reports/weekly-*.json 2>/dev/null | sort | tail -1)
          if [ -n "$REPORT" ]; then
            echo "report_path=$REPORT" >> $GITHUB_OUTPUT
            echo "has_report=true" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
          fi

      - name: Build PR body
        if: steps.check_report.outputs.has_report == 'true' && github.event.inputs.dry_run != 'true'
        id: pr_body
        run: |
          REPORT="${{ steps.check_report.outputs.report_path }}"
          DATE=$(node -e "const r=require('./$REPORT'); console.log(r.date)")
          REDAMAGE=$(node -e "const r=require('./$REPORT'); console.log(r.re_damage_signals.length)")
          LIFECYCLE=$(node -e "const r=require('./$REPORT'); console.log(r.lifecycle_signals.length)")
          CANDIDATES=$(node -e "const r=require('./$REPORT'); console.log(r.candidate_new_assets.length)")
          ITEMS=$(node -e "const r=require('./$REPORT'); console.log(r.feed_items_fetched)")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Weekly Refresh — $DATE
          - Feed items fetched: $ITEMS
          - Re-damage signals: $REDAMAGE
          - Lifecycle signals: $LIFECYCLE
          - Candidate new assets: $CANDIDATES
          EOF

          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "redamage=$REDAMAGE" >> $GITHUB_OUTPUT
          echo "lifecycle=$LIFECYCLE" >> $GITHUB_OUTPUT
          echo "candidates=$CANDIDATES" >> $GITHUB_OUTPUT

      - name: Commit report and open draft PR
        if: steps.check_report.outputs.has_report == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.pr_body.outputs.date }}"
          BRANCH="refresh/weekly-${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add reports/
          git commit -m "data: weekly refresh report ${DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Weekly refresh — ${DATE}" \
            --body "$(cat << 'PREOF'
## Weekly Refresh — ${{ steps.pr_body.outputs.date }}

Auto-generated by the weekly refresh workflow. **Nothing in this PR auto-merges.** Review each signal and apply changes manually.

### Signals
- **Re-damage signals:** ${{ steps.pr_body.outputs.redamage }} — check \`re_damage_count\` fields
- **Lifecycle signals:** ${{ steps.pr_body.outputs.lifecycle }} — check \`wartime_status.lifecycle\` fields
- **Candidate new assets:** ${{ steps.pr_body.outputs.candidates }} — review LLM classifications, verify against sources, run \`scripts/new-asset.js\` if valid

### Review checklist
- [ ] Verify each re-damage signal against source links in the report
- [ ] Update \`re_damage_count\` on confirmed re-damaged assets
- [ ] Verify each lifecycle signal and update \`wartime_status.lifecycle\`
- [ ] For each candidate new asset: verify classification, add physical specs, run compute-costs, create via \`scripts/new-asset.js\`
- [ ] Update \`data/assets/index.json\` if new assets added
- [ ] Run \`node scripts/validate-all.js\` before merging
PREOF
)" \
            --draft \
            --base main \
            --head "$BRANCH"

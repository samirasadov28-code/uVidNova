name: Validate Asset Data

on:
  push:
    paths:
      - 'data/assets/**'
      - 'data/taxonomy.json'
      - 'schemas/**'
      - 'scripts/validate-all.js'
  pull_request:
    paths:
      - 'data/assets/**'
      - 'data/taxonomy.json'
      - 'schemas/**'
      - 'scripts/validate-all.js'

jobs:
  validate:
    name: JSON Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Validate all asset records
        run: node scripts/validate-all.js

      - name: Validate unit_cost_table.json (if present)
        run: |
          if [ -f data/unit_cost_table.json ]; then
            npx ajv validate \
              --spec=draft2020 \
              -s schemas/unit_cost.schema.json \
              -d data/unit_cost_table.json \
              --errors=text
            echo "unit_cost_table.json: PASS"
          else
            echo "unit_cost_table.json not yet present — skipping."
          fi

      - name: Validate financing_templates.json (if present)
        run: |
          if [ -f data/financing_templates.json ]; then
            npx ajv validate \
              --spec=draft2020 \
              -s schemas/financing_template.schema.json \
              -d data/financing_templates.json \
              --errors=text
            echo "financing_templates.json: PASS"
          else
            echo "financing_templates.json not yet present — skipping."
          fi

      - name: Validate precedents.json (if present)
        run: |
          if [ -f data/precedents.json ]; then
            npx ajv validate \
              --spec=draft2020 \
              -s schemas/precedent.schema.json \
              -d data/precedents.json \
              --errors=text
            echo "precedents.json: PASS"
          else
            echo "precedents.json not yet present — skipping."
          fi
